version: '3'

tasks:
  default:
    cmds:
      - task --list
    silent: true

  build:
    desc: Build the wand binary to bin/wand
    cmds:
      - go build -o bin/wand

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  install:
    desc: Build and install wand to GOPATH/bin
    deps: [build]
    cmds:
      - cp bin/wand $(go env GOPATH)/bin/wand

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/
