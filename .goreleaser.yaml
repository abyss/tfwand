# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    binary: wand

archives:
  - id: default
    files:
      - LICENSE
      - README.md
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: tfwand
    homepage: https://github.com/abyss/tfwand
    description: "tfwand — OpenTofu/Terraform utility toolkit"

    directory: Formula
    repository:
      owner: abyss
      name: homebrew-tools
      token: "{{ .Env.HOMEBREW_TOOLS_PAT }}"

    install: |
      bin.install "wand"
